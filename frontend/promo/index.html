<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- OG / Telegram / VK preview -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Serpmonn.ru">
  <meta name="twitter:card" content="summary_large_image">

  <title id="pageTitle">Промокод | Serpmonn.ru</title>

  <!-- Favicon -->
  <link rel="icon" href="/frontend/images/serpmonn.ico" type="image/x-icon">

  <!-- Глобальные стили сайта -->
  <link rel="stylesheet" href="/frontend/styles/styles.css">
  <link rel="stylesheet" href="/frontend/styles/accessibility.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }

    body {
      min-height: 100dvh;
      background: #f5f5f0;
      color: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 40px;
    }

    /* ── Меню (nav) занимает всю ширину ── */
    header {
      width: 100%;
    }
    header nav#main-nav {
      width: 100%;
    }

    /* ── Breadcrumb / back link ── */
    .back-bar {
      width: 100%;
      max-width: 640px;
      padding: 14px 0 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .back-bar a {
      font-size: 0.83rem;
      color: #01696f;
      text-decoration: none;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.18s;
    }
    .back-bar a:hover { color: #0c4e54; }
    .back-bar a::before { content: '←'; font-size: 0.9em; }
    .back-bar .sep { color: #ccc; font-size: 0.78rem; }
    .back-bar .current { font-size: 0.83rem; color: #999; }

    /* ── Card ── */
    .promo-wrap {
      width: 100%;
      max-width: 560px;
      margin-top: 8px;
    }

    .promo-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.05);
      overflow: hidden;
      animation: fadeUp 0.35s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 20px 0;
    }

    .brand-logo {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      object-fit: contain;
      border: 1px solid rgba(0,0,0,.07);
      flex-shrink: 0;
      background: #f5f5f0;
    }

    .brand-info { flex: 1; min-width: 0; }
    .brand-name {
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .brand-category {
      font-size: 0.78rem;
      color: #888;
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .discount-badge {
      flex-shrink: 0;
      background: #c0392b;
      color: #fff;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.85rem;
      font-weight: 700;
    }

    .card-body { padding: 16px 20px 0; }

    .promo-description {
      font-size: 0.9rem;
      color: #444;
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .validity {
      margin-top: 10px;
      font-size: 0.78rem;
      color: #999;
    }
    .validity.expired { color: #c0392b; }

    /* ── Code block ── */
    .code-block {
      margin: 16px 20px 0;
      border: 2px dashed #01696f;
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: rgba(1,105,111,.04);
    }
    .code-value {
      font-family: 'Courier New', Courier, monospace;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #01696f;
      word-break: break-all;
    }
    .btn-copy {
      flex-shrink: 0;
      border: none;
      background: #01696f;
      color: #fff;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.83rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s;
    }
    .btn-copy:hover { background: #0c4e54; }
    .btn-copy.copied { background: #2ecc71; }

    /* ── Actions ── */
    .card-actions {
      padding: 16px 20px 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn-use {
      flex: 1;
      min-width: 140px;
      padding: 12px 18px;
      border-radius: 12px;
      border: none;
      background: #c0392b;
      color: #fff;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.18s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-use:hover { background: #a93226; }

    .btn-share {
      flex-shrink: 0;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1.5px solid #ddd;
      background: transparent;
      color: #555;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.18s, color 0.18s;
    }
    .btn-share:hover { border-color: #01696f; color: #01696f; }

    /* ── Not-found ── */
    .not-found {
      text-align: center;
      padding: 48px 24px;
      animation: fadeUp 0.3s ease both;
    }
    .not-found .icon { font-size: 3rem; margin-bottom: 16px; }
    .not-found h2 { font-size: 1.2rem; margin-bottom: 8px; }
    .not-found p { color: #666; font-size: 0.9rem; margin-bottom: 24px; }
    .not-found a {
      display: inline-block;
      padding: 10px 24px;
      background: #01696f;
      color: #fff;
      border-radius: 20px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
    }

    /* ── Skeleton ── */
    .skeleton-wrap { width: 100%; max-width: 560px; margin-top: 8px; }
    .skeleton-card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }
    .sk {
      background: linear-gradient(90deg,#eee 25%,#f5f5f5 50%,#eee 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
      border-radius: 6px;
    }
    .sk-row { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
    .sk-logo { width:52px; height:52px; border-radius:12px; flex-shrink:0; }
    .sk-lines { flex:1; display:flex; flex-direction:column; gap:8px; }
    .sk-line { height:14px; }
    .sk-line.short { width: 60%; }
    .sk-desc { height:12px; margin-bottom:6px; }
    .sk-desc.short { width:75%; }
    .sk-code { height:56px; border-radius:12px; margin-bottom:16px; }
    .sk-btns { display:flex; gap:10px; }
    .sk-btn { height:44px; flex:1; border-radius:12px; }
    .sk-btn.small { flex: 0 0 80px; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a1a;
      color: #fff;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 0.87rem;
      font-weight: 600;
      transition: transform 0.28s cubic-bezier(0.16,1,0.3,1), opacity 0.28s;
      opacity: 0;
      pointer-events: none;
      z-index: 9999;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    @media (max-width: 420px) {
      .card-top { gap: 10px; }
      .code-value { font-size: 1rem; }
    }
  </style>
</head>
<body>

<!-- Меню — такое же как на странице промокодов -->
<header>
  <nav id="main-nav" aria-label="Основная навигация"></nav>
</header>

<!-- Хлебные крошки / ссылка назад -->
<nav class="back-bar" aria-label="Навигация">
  <a href="/frontend/promo-codes-and-discounts/promokody-skidki.html">Все промокоды</a>
  <span class="sep">›</span>
  <span class="current" id="breadcrumbCurrent">Промокод</span>
</nav>

<div id="root"></div>

<div class="toast" id="toast">Промокод скопирован!</div>

<!-- Меню загружается тем же механизмом что и на основном сайте -->
<script type="module" src="/frontend/scripts/menu-loader.js" defer></script>

<script>
(function () {
  const root  = document.getElementById('root');
  const toast = document.getElementById('toast');

  // ── Если code= не передан — редирект на основную страницу промокодов ──
  const params = new URLSearchParams(window.location.search);
  const code   = (params.get('code') || '').trim();

  if (!code) {
    window.location.replace('/frontend/promo-codes-and-discounts/promokody-skidki.html');
    return;
  }

  // ── Skeleton ──
  root.innerHTML = `
    <div class="skeleton-wrap">
      <div class="skeleton-card">
        <div class="sk-row">
          <div class="sk sk-logo"></div>
          <div class="sk-lines">
            <div class="sk sk-line"></div>
            <div class="sk sk-line short"></div>
          </div>
        </div>
        <div class="sk sk-desc"></div>
        <div class="sk sk-desc short"></div>
        <div class="sk sk-desc" style="width:50%;margin-bottom:14px;"></div>
        <div class="sk sk-code"></div>
        <div class="sk-btns">
          <div class="sk sk-btn"></div>
          <div class="sk sk-btn small"></div>
        </div>
      </div>
    </div>`;

  // ── Helpers ──
  function formatDate(iso) {
    if (!iso) return null;
    try {
      const d = new Date(iso);
      if (isNaN(d)) return null;
      return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
    } catch { return null; }
  }

  function isExpired(iso) {
    if (!iso) return false;
    const d = new Date(iso);
    return !isNaN(d) && d < new Date();
  }

  function discountLabel(p) {
    if (!p) return null;
    if (p.discount_percent) return `−${p.discount_percent}%`;
    if (p.discount_amount)  return `−${p.discount_amount} ₽`;
    return null;
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  function copyText(text) {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
    } else { fallbackCopy(text); }
  }

  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }

  function esc(str) {
    return String(str || '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function setMeta(property, content) {
    let el = document.querySelector(`meta[property="${property}"]`);
    if (!el) { el = document.createElement('meta'); el.setAttribute('property', property); document.head.appendChild(el); }
    el.setAttribute('content', content);
  }

  // ── meta description & canonical ──         function setMetaName(name, content) {           let el = document.querySelector(`meta[name="${name}"]`);           if (!el) { el = document.createElement('meta'); el.setAttribute('name', name); document.head.appendChild(el); }           el.setAttribute('content', content);         }         function setCanonical(url) {           let el = document.querySelector('link[rel="canonical"]');           if (!el) { el = document.createElement('link'); el.setAttribute('rel', 'canonical'); document.head.appendChild(el); }           el.setAttribute('href', url);         }         // ── BreadcrumbList JSON-LD ──         function injectBreadcrumb(promoTitle) {           const old = document.getElementById('json-ld-breadcrumb');           if (old) old.remove();           const schema = {             '@context': 'https://schema.org',             '@type': 'BreadcrumbList',             'itemListElement': [               { '@type': 'ListItem', 'position': 1, 'name': 'Главная', 'item': 'https://serpmonn.ru/' },               { '@type': 'ListItem', 'position': 2, 'name': 'Промокоды', 'item': 'https://serpmonn.ru/frontend/promo-codes-and-discounts/promokody-skidki.html' },               { '@type': 'ListItem', 'position': 3, 'name': promoTitle, 'item': window.location.href }             ]           };           const script = document.createElement('script');           script.id = 'json-ld-breadcrumb';           script.type = 'application/ld+json';           script.textContent = JSON.stringify(schema);           document.head.appendChild(script);         }         // ── JSON-LD (schema.org/Offer) ──
  function injectJsonLd(promo) {
    const old = document.getElementById('json-ld-promo');
    if (old) old.remove();

    const schema = {
      '@context': 'https://schema.org',
      '@type': 'Offer',
      'name': promo.title,
      'description': promo.description || '',
      'url': window.location.href
    };

    if (promo.discount_percent) schema['discount'] = promo.discount_percent + '%';
    if (promo.valid_until)      schema['priceValidUntil'] = promo.valid_until;
    if (promo.image_url)        schema['image'] = promo.image_url;
    if (promo.landing_url) {
      schema['seller'] = { '@type': 'Organization', 'url': promo.landing_url };
    }

    const script = document.createElement('script');
    script.id   = 'json-ld-promo';
    script.type = 'application/ld+json';
    script.textContent = JSON.stringify(schema);
    document.head.appendChild(script);
  }

  // ── Render ──
  function render(promo) {
    const expired = isExpired(promo.valid_until);
    const badge   = discountLabel(promo);
    const dateStr = formatDate(promo.valid_until);
    const hasCode = Boolean(promo.promocode);

    // Обновляем title, OG, хлебные крошки
    const titleText = `${promo.title}${badge ? ' — ' + badge : ''} | Serpmonn.ru`;
    document.title = titleText;
    const bc = document.getElementById('breadcrumbCurrent');
    if (bc) bc.textContent = promo.title;
    setMeta('og:title',       titleText);
    setMeta('og:description', promo.description || '');
    if (promo.image_url) setMeta('og:image', promo.image_url);
    setMeta('og:url', window.location.href);

    // Вставляем meta description, canonical, breadcrumb и JSON-LD         setMetaName('description', promo.description || '');         setCanonical(window.location.href);         injectBreadcrumb(promo.title);         // Вставляем JSON-LD
    injectJsonLd(promo);

    root.innerHTML = `
      <div class="promo-wrap">
        <div class="promo-card">
          <div class="card-top">
            ${promo.image_url
              ? `<img class="brand-logo" src="${esc(promo.image_url)}" alt="${esc(promo.title)}" width="52" height="52" loading="lazy" onerror="this.style.display='none'">`
              : ''}
            <div class="brand-info">
              <div class="brand-name">${esc(promo.title)}</div>
              ${promo.category ? `<div class="brand-category">${esc(promo.category)}</div>` : ''}
            </div>
            ${badge ? `<div class="discount-badge">${esc(badge)}</div>` : ''}
          </div>

          <div class="card-body">
            <p class="promo-description">${esc(promo.description || '')}</p>
            ${dateStr
              ? `<div class="validity${expired ? ' expired' : ''}">
                   ${expired ? '⛔ Истёк ' : '✅ До '}${dateStr}
                 </div>`
              : ''}
          </div>

          ${hasCode ? `
          <div class="code-block">
            <span class="code-value" id="codeValue">${esc(promo.promocode)}</span>
            <button class="btn-copy" id="btnCopy" onclick="doCopy()">Копировать</button>
          </div>` : ''}

          <div class="card-actions">
            ${promo.landing_url
              ? `<a class="btn-use" href="${esc(promo.landing_url)}" target="_blank" rel="noopener noreferrer">
                   Перейти на сайт →
                 </a>`
              : ''}
            <button class="btn-share" onclick="doShare()">&#128279; Поделиться</button>
          </div>
        </div>
      </div>`;

    window.doCopy = function () {
      const btn = document.getElementById('btnCopy');
      copyText(promo.promocode);
      showToast('Промокод скопирован!');
      btn.textContent = '✓ Скопировано';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Копировать'; btn.classList.remove('copied'); }, 2000);
    };

    window.doShare = function () {
      const url = window.location.href;
      if (navigator.share) {
        navigator.share({ title: promo.title, text: promo.description || '', url });
      } else {
        copyText(url);
        showToast('Ссылка скопирована!');
      }
    };
  }

  function renderNotFound(codeParam) {
    const bc = document.getElementById('breadcrumbCurrent');
    if (bc) bc.textContent = 'Не найдено';
    root.innerHTML = `
      <div class="not-found">
        <div class="icon">🔍</div>
        <h2>Промокод не найден</h2>
        <p>Промокод «${esc(codeParam)}» не найден или больше не активен.</p>
        <a href="/frontend/promo-codes-and-discounts/promokody-skidki.html">Смотреть все промокоды</a>
      </div>`;
  }

  // ── Fetch ──
  fetch(`/api/promocodes/by-code?code=${encodeURIComponent(code)}`)
    .then(r => {
      if (r.status === 404) return null;
      if (!r.ok) throw new Error('Server error ' + r.status);
      return r.json();
    })
    .then(data => {
      if (!data || data.status !== 'success' || !data.data) {
        renderNotFound(code);
      } else {
        render(data.data);
      }
    })
    .catch(() => renderNotFound(code));

})();
</script>

</body>
</html>
