<!doctype html>
<html lang="ru" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=3, user-scalable=yes">
<title>Каталог ИИ-агентов — Serpmonn</title>
<meta name="description" content="Каталог ИИ-агентов на платформе Serpmonn. Найдите агента для автоматизации бизнеса.">
<link rel="icon" href="/frontend/images/serpmonn.ico" type="image/x-icon">
<link rel="manifest" href="/frontend/pwa/manifest.json">
<link rel="stylesheet" href="/frontend/styles/styles.css">
<style>
  .agents-page { max-width: 1100px; margin: 0 auto; padding: 24px 16px 48px; }
  .agents-header { margin-bottom: 28px; }
  .agents-header h1 { font-size: clamp(1.4rem, 3vw, 2rem); margin-bottom: 8px; }
  .agents-header p { color: #888; font-size: 0.97rem; }
  .search-agents { width: 100%; max-width: 420px; padding: 10px 16px; border-radius: 10px; border: 1.5px solid #e0e0e0; font-size: 0.97rem; margin-bottom: 24px; outline: none; transition: border .15s; display: block; }
  .search-agents:focus { border-color: #e8463c; }
  .agents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(280px,100%), 1fr)); gap: 20px; }
  .agent-card { border: 1.5px solid #e8e8e8; border-radius: 14px; padding: 20px; display: flex; flex-direction: column; gap: 10px; transition: box-shadow .18s, transform .18s; background: #fff; }
  .agent-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,.10); transform: translateY(-2px); }
  .agent-card-top { display: flex; align-items: center; gap: 12px; }
  .agent-icon { width: 48px; height: 48px; border-radius: 12px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; flex-shrink: 0; }
  .agent-name { font-weight: 600; font-size: 1rem; }
  .agent-desc { font-size: 0.9rem; color: #666; line-height: 1.5; flex: 1; }
  .agent-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
  .agent-price { font-weight: 700; font-size: 1rem; }
  .agent-price.free { color: #28a745; }
  .agent-btn { padding: 7px 18px; border-radius: 8px; background: #e8463c; color: #fff; border: none; font-size: 0.87rem; font-weight: 600; cursor: pointer; transition: background .15s; text-decoration: none; display: inline-block; }
  .agent-btn:hover { background: #c8332a; }
  .agents-empty { text-align: center; padding: 60px 20px; color: #aaa; }
  .agents-empty p { margin-top: 10px; font-size: 0.93rem; }
  .skeleton-card { border: 1.5px solid #e8e8e8; border-radius: 14px; padding: 20px; background: #fff; }
  @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:.4} }
  .skel { background: #f0f0f0; border-radius: 6px; animation: shimmer 1.4s infinite; }
  @media (prefers-color-scheme: dark) {
    .agent-card, .skeleton-card { background: #1e1e1e; border-color: #333; }
    .agent-icon { background: #2a2a2a; }
    .agent-desc { color: #aaa; }
    .search-agents { background: #1e1e1e; color: #eee; border-color: #444; }
    .skel { background: #333; }
  }
</style>
</head>
<body>
<script type="module" src="/frontend/scripts/menu-loader.js?v=miniapp1" defer></script>

<main class="agents-page">
  <div class="agents-header">
    <h1>🤖 Каталог ИИ-агентов</h1>
    <p>Автоматизируйте задачи с готовыми ИИ-агентами от разработчиков платформы</p>
  </div>

  <input type="search" class="search-agents" id="agentSearch" placeholder="Поиск агентов..." autocomplete="off">

  <div class="agents-grid" id="agentsGrid">
    <!-- скелетон пока грузится -->
    <div class="skeleton-card"><div class="skel" style="height:48px;width:48px;border-radius:12px;margin-bottom:12px"></div><div class="skel" style="height:16px;width:60%;margin-bottom:8px"></div><div class="skel" style="height:12px;width:90%;margin-bottom:4px"></div><div class="skel" style="height:12px;width:75%"></div></div>
    <div class="skeleton-card"><div class="skel" style="height:48px;width:48px;border-radius:12px;margin-bottom:12px"></div><div class="skel" style="height:16px;width:60%;margin-bottom:8px"></div><div class="skel" style="height:12px;width:90%;margin-bottom:4px"></div><div class="skel" style="height:12px;width:75%"></div></div>
    <div class="skeleton-card"><div class="skel" style="height:48px;width:48px;border-radius:12px;margin-bottom:12px"></div><div class="skel" style="height:16px;width:60%;margin-bottom:8px"></div><div class="skel" style="height:12px;width:90%;margin-bottom:4px"></div><div class="skel" style="height:12px;width:75%"></div></div>
  </div>
</main>

<script>
let allAgents = [];

async function loadAgents() {
  try {
    const res = await fetch('/api/agents/marketplace');
    const data = await res.json();
    allAgents = (data.status === 'ok' && Array.isArray(data.agents)) ? data.agents : [];
  } catch(e) {
    allAgents = [];
  }
  renderAgents(allAgents);
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderAgents(agents) {
  const grid = document.getElementById('agentsGrid');
  if (!agents.length) {
    grid.innerHTML = '<div class="agents-empty">🤖<p>Агентов пока нет.<br>Если вы разработчик — <a href="/frontend/agents/dashboard.html">опубликуйте первого агента</a>.</p></div>';
    return;
  }
  grid.innerHTML = agents.map(a => {
    const price = Number(a.price_rub);
    const priceHtml = price === 0
      ? '<span class="agent-price free">Бесплатно</span>'
      : `<span class="agent-price">${price.toLocaleString('ru-RU')} ₽/мес</span>`;
    const agentId = a.slug || a.id;
    return `
    <div class="agent-card" data-name="${esc(a.name).toLowerCase()}" data-desc="${esc(a.description||'').toLowerCase()}">
      <div class="agent-card-top">
        <div class="agent-icon">🤖</div>
        <div>
          <div class="agent-name">${esc(a.name)}</div>
        </div>
      </div>
      <div class="agent-desc">${esc(a.description || '')}</div>
      <div class="agent-footer">
        ${priceHtml}
        <a href="/frontend/agents/agent.html?id=${encodeURIComponent(agentId)}" class="agent-btn">Подключить</a>
      </div>
    </div>`;
  }).join('');
}

function filterAgents(q) {
  if (!q) return renderAgents(allAgents);
  const query = q.toLowerCase();
  renderAgents(allAgents.filter(a =>
    (a.name||'').toLowerCase().includes(query) ||
    (a.description||'').toLowerCase().includes(query)
  ));
}

document.getElementById('agentSearch').addEventListener('input', e => filterAgents(e.target.value));

loadAgents();
</script>
</body>
</html>
