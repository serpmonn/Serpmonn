<!doctype html>
<html lang="ru" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=3, user-scalable=yes">
<title>Мои агенты — Serpmonn</title>
<meta name="description" content="Управляйте подключёнными ИИ-агентами на платформе Serpmonn.">
<link rel="icon" href="/frontend/images/serpmonn.ico" type="image/x-icon">
<link rel="manifest" href="/frontend/pwa/manifest.json">
<link rel="stylesheet" href="/frontend/styles/styles.css">
<style>
  .my-agents-page { max-width: 900px; margin: 0 auto; padding: 24px 16px 48px; }
  .page-header { margin-bottom: 28px; }
  .page-header h1 { font-size: clamp(1.4rem, 3vw, 2rem); margin-bottom: 6px; }
  .page-header p { color: #888; font-size: 0.95rem; }
  .empty-state { text-align: center; padding: 64px 24px; }
  .empty-state-icon { font-size: 3.5rem; margin-bottom: 16px; }
  .empty-state h2 { font-size: 1.2rem; margin-bottom: 10px; }
  .empty-state p { color: #888; max-width: 340px; margin: 0 auto 24px; font-size: 0.95rem; line-height: 1.5; }
  .btn-primary { display: inline-block; padding: 11px 28px; background: #e8463c; color: #fff; border-radius: 10px; font-weight: 600; font-size: 0.95rem; text-decoration: none; border: none; cursor: pointer; transition: background .15s; }
  .btn-primary:hover { background: #c8332a; }
  .my-agent-card { border: 1.5px solid #e8e8e8; border-radius: 14px; padding: 18px 20px; display: flex; align-items: center; gap: 16px; margin-bottom: 14px; background: #fff; transition: box-shadow .15s; }
  .my-agent-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); }
  .agent-icon-lg { width: 52px; height: 52px; border-radius: 13px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; flex-shrink: 0; }
  .agent-info { flex: 1; }
  .agent-info h3 { font-size: 1rem; font-weight: 600; margin-bottom: 3px; }
  .agent-info .meta { font-size: 0.83rem; color: #999; }
  .agent-status { display: inline-flex; align-items: center; gap: 5px; font-size: 0.82rem; font-weight: 600; padding: 3px 10px; border-radius: 12px; }
  .status-active { background: #d4edda; color: #155724; }
  .status-paused { background: #fff3cd; color: #856404; }
  .agent-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .btn-sm { padding: 6px 14px; border-radius: 8px; font-size: 0.83rem; font-weight: 600; cursor: pointer; border: 1.5px solid; transition: all .15s; text-decoration: none; display: inline-block; }
  .btn-outline { background: none; border-color: #e0e0e0; color: inherit; }
  .btn-outline:hover { border-color: #e8463c; color: #e8463c; }
  .btn-danger { background: none; border-color: #fcc; color: #e8463c; }
  .btn-danger:hover { background: #e8463c; color: #fff; border-color: #e8463c; }
  .stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 14px; margin-bottom: 28px; }
  .stat-card { border: 1.5px solid #e8e8e8; border-radius: 12px; padding: 16px 18px; background: #fff; }
  .stat-card .stat-val { font-size: 1.6rem; font-weight: 700; }
  .stat-card .stat-label { font-size: 0.82rem; color: #888; margin-top: 3px; }
  @media (max-width: 600px) { .my-agent-card { flex-wrap: wrap; } .agent-actions { width: 100%; } }
  @media (prefers-color-scheme: dark) {
    .my-agent-card, .stat-card { background: #1e1e1e; border-color: #333; }
    .agent-icon-lg { background: #2a2a2a; }
  }
</style>
</head>
<body>
<script type="module" src="/frontend/scripts/menu-loader.js?v=miniapp1" defer></script>

<main class="my-agents-page" id="mainContent">
  <div class="page-header">
    <h1>📋 Мои агенты</h1>
    <p>Управляйте подключёнными ИИ-агентами</p>
  </div>

  <!-- Показывается если агенты есть -->
  <div id="hasAgents" style="display:none">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-val" id="statActive">0</div>
        <div class="stat-label">Активных агентов</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="statMessages">0</div>
        <div class="stat-label">Сообщений за месяц</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="statSpend">0 ₽</div>
        <div class="stat-label">Расходы в месяц</div>
      </div>
    </div>
    <div id="agentsList"></div>
    <div style="margin-top:20px">
      <a href="/frontend/agents/agents.html" class="btn-primary">+ Добавить агента</a>
    </div>
  </div>

  <!-- Показывается если агентов нет -->
  <div id="noAgents" class="empty-state">
    <div class="empty-state-icon">🤖</div>
    <h2>Агентов пока нет</h2>
    <p>Подключите первого ИИ-агента из каталога и автоматизируйте рутинные задачи уже сегодня.</p>
    <a href="/frontend/agents/agents.html" class="btn-primary">Перейти в каталог</a>
  </div>
</main>

<script>
  // Демо-данные (заменить на API)
  const demoAgents = [
    { id: 1, icon: '💬', name: 'ВКонтакте Менеджер', category: 'Соцсети', status: 'active', messages: 1240, price: 990, since: 'с 01.05.2026' },
    { id: 2, icon: '✍️', name: 'SEO Копирайтер', category: 'Контент', status: 'paused', messages: 85, price: 790, since: 'с 10.06.2026' },
  ];

  function renderAgents(agents) {
    if (!agents || agents.length === 0) {
      document.getElementById('noAgents').style.display = '';
      document.getElementById('hasAgents').style.display = 'none';
      return;
    }
    document.getElementById('noAgents').style.display = 'none';
    document.getElementById('hasAgents').style.display = '';
    const active = agents.filter(a => a.status === 'active');
    document.getElementById('statActive').textContent = active.length;
    document.getElementById('statMessages').textContent = agents.reduce((s,a) => s + a.messages, 0).toLocaleString('ru');
    document.getElementById('statSpend').textContent = agents.reduce((s,a) => s + a.price, 0).toLocaleString('ru') + ' ₽';
    const list = document.getElementById('agentsList');
    list.innerHTML = agents.map(a => `
      <div class="my-agent-card">
        <div class="agent-icon-lg">${a.icon}</div>
        <div class="agent-info">
          <h3>${a.name}</h3>
          <div class="meta">${a.category} · ${a.since} · ${a.messages.toLocaleString('ru')} сообщений</div>
          <span class="agent-status ${a.status === 'active' ? 'status-active' : 'status-paused'}">
            ${a.status === 'active' ? '● Активен' : '⏸ Пауза'}
          </span>
        </div>
        <div class="agent-actions">
          <button class="btn-sm btn-outline" onclick="toggleAgent(${a.id})">${a.status === 'active' ? 'Пауза' : 'Запустить'}</button>
          <button class="btn-sm btn-outline">Настройки</button>
          <button class="btn-sm btn-danger" onclick="removeAgent(${a.id})">Отключить</button>
        </div>
      </div>
    `).join('');
  }

  let agents = [...demoAgents];

  function toggleAgent(id) {
    agents = agents.map(a => a.id === id ? {...a, status: a.status === 'active' ? 'paused' : 'active'} : a);
    renderAgents(agents);
  }
  function removeAgent(id) {
    if (!confirm('Отключить агента?')) return;
    agents = agents.filter(a => a.id !== id);
    renderAgents(agents);
  }

  // Для демо — показываем агентов. В продакшне проверять авторизацию и тянуть с API
  renderAgents(agents);
</script>
</body>
</html>
