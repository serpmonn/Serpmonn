<!doctype html>
<html lang="ru" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=3, user-scalable=yes">
<title>Мои агенты — Serpmonn</title>
<meta name="description" content="Управляйте подключёнными ИИ-агентами на платформе Serpmonn.">
<link rel="icon" href="/frontend/images/serpmonn.ico" type="image/x-icon">
<link rel="manifest" href="/frontend/pwa/manifest.json">
<link rel="stylesheet" href="/frontend/styles/styles.css">
<style>
  .my-agents-page { max-width: 900px; margin: 0 auto; padding: 24px 16px 48px; }
  .page-header { margin-bottom: 28px; }
  .page-header h1 { font-size: clamp(1.4rem, 3vw, 2rem); margin-bottom: 6px; }
  .page-header p { color: #888; font-size: 0.95rem; }
  .empty-state { text-align: center; padding: 64px 24px; }
  .empty-state-icon { font-size: 3.5rem; margin-bottom: 16px; }
  .empty-state h2 { font-size: 1.2rem; margin-bottom: 10px; }
  .empty-state p { color: #888; max-width: 340px; margin: 0 auto 24px; font-size: 0.95rem; line-height: 1.5; }
  .btn-primary { display: inline-block; padding: 11px 28px; background: #e8463c; color: #fff; border-radius: 10px; font-weight: 600; font-size: 0.95rem; text-decoration: none; border: none; cursor: pointer; transition: background .15s; }
  .btn-primary:hover { background: #c8332a; }
  .my-agent-card { border: 1.5px solid #e8e8e8; border-radius: 14px; padding: 18px 20px; margin-bottom: 14px; background: #fff; transition: box-shadow .15s; }
  .my-agent-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); }
  .card-top { display: flex; align-items: flex-start; gap: 16px; }
  .agent-icon-lg { width: 52px; height: 52px; border-radius: 13px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; flex-shrink: 0; }
  .agent-info { flex: 1; min-width: 0; }
  .agent-info h3 { font-size: 1rem; font-weight: 600; margin-bottom: 3px; }
  .agent-info .meta { font-size: 0.83rem; color: #999; margin-bottom: 6px; }
  .agent-status { display: inline-flex; align-items: center; gap: 5px; font-size: 0.82rem; font-weight: 600; padding: 3px 10px; border-radius: 12px; }
  .status-active { background: #d4edda; color: #155724; }
  .status-expired { background: #f8d7da; color: #721c24; }
  .agent-actions { display: flex; gap: 8px; flex-shrink: 0; align-items: center; flex-wrap: wrap; }
  .btn-sm { padding: 6px 14px; border-radius: 8px; font-size: 0.83rem; font-weight: 600; cursor: pointer; border: 1.5px solid; transition: all .15s; text-decoration: none; display: inline-block; background: none; }
  .btn-outline { border-color: #e0e0e0; color: inherit; }
  .btn-outline:hover { border-color: #e8463c; color: #e8463c; }
  .btn-green { border-color: #28a745; color: #28a745; }
  .btn-green:hover { background: #28a745; color: #fff; }
  /* gateway раскрывающийся блок */
  .gateway-panel { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid #f0f0f0; }
  .gateway-panel.open { display: block; }
  .gateway-panel .gw-label { font-size: 0.82rem; color: #888; margin-bottom: 8px; }
  .url-row { display: flex; align-items: center; gap: 8px; }
  .url-box { flex: 1; background: #f9fff9; border: 1.5px solid #c8e6c9; border-radius: 8px; padding: 9px 12px; font-family: monospace; font-size: 0.82rem; word-break: break-all; color: #155724; }
  .copy-btn { flex-shrink: 0; padding: 8px 14px; background: #28a745; color: #fff; border-radius: 8px; border: none; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: background .15s; }
  .copy-btn:hover { background: #1e7e34; }
  .copy-btn.copied { background: #155724; }
  .gateway-panel .code-hint { margin-top: 10px; background: #f5f5f5; border-radius: 8px; padding: 12px 14px; font-family: monospace; font-size: 0.78rem; line-height: 1.6; color: #444; overflow-x: auto; }
  /* stats */
  .stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 14px; margin-bottom: 28px; }
  .stat-card { border: 1.5px solid #e8e8e8; border-radius: 12px; padding: 16px 18px; background: #fff; }
  .stat-card .stat-val { font-size: 1.6rem; font-weight: 700; }
  .stat-card .stat-label { font-size: 0.82rem; color: #888; margin-top: 3px; }
  /* skeleton */
  .skeleton { height: 80px; background: #f0f0f0; border-radius: 12px; animation: shimmer 1.4s ease-in-out infinite; }
  @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:.4} }
  @media (max-width: 600px) { .card-top { flex-wrap: wrap; } .agent-actions { width: 100%; } }
  @media (prefers-color-scheme: dark) {
    .my-agent-card, .stat-card { background: #1e1e1e; border-color: #333; }
    .agent-icon-lg { background: #2a2a2a; }
    .gateway-panel { border-color: #2a2a2a; }
    .url-box { background: #0d2313; border-color: #2d5c35; color: #a6e3a1; }
    .gateway-panel .code-hint { background: #252525; color: #ccc; }
    .skeleton { background: #333; }
    .status-active { background: #1a3324; color: #75c98a; }
    .status-expired { background: #3a1218; color: #f1898e; }
  }
</style>
</head>
<body>
<script type="module" src="/frontend/scripts/menu-loader.js?v=miniapp1" defer></script>

<main class="my-agents-page" id="mainContent">
  <div class="page-header">
    <h1>📋 Мои агенты</h1>
    <p>Подключённые ИИ-агенты и их gateway URL</p>
  </div>

  <div id="pageState">
    <div class="skeleton" style="margin-bottom:12px"></div>
    <div class="skeleton" style="height:40px"></div>
  </div>
</main>

<script>
const token = typeof serpToken !== 'undefined' ? serpToken : null;

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtDate(d) {
  return new Date(d).toLocaleDateString('ru-RU', { day:'2-digit', month:'short', year:'numeric' });
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
  });
}
window.copyText = copyText;

function toggleGateway(id, agentId) {
  const panel = document.getElementById('gw-' + id);
  const btn   = document.getElementById('gwbtn-' + id);
  if (!panel) return;
  const isOpen = panel.classList.toggle('open');
  btn.textContent = isOpen ? 'Скрыть URL' : '🔗 Gateway URL';
  if (isOpen && !panel.dataset.loaded) {
    loadGatewayUrl(id, agentId, panel);
  }
}
window.toggleGateway = toggleGateway;

async function loadGatewayUrl(cardId, agentId, panel) {
  panel.dataset.loaded = '1';
  panel.innerHTML = '<div class="gw-label">Загружаем...</div>';
  try {
    const r = await fetch(`/api/agents/${agentId}/access`, {
      headers: { Authorization: 'Bearer ' + token }
    });
    const d = await r.json();
    if (r.ok && d.status === 'ok') {
      const gurl = esc(d.gateway_url);
      const until = fmtDate(d.active_until);
      panel.innerHTML = `
        <div class="gw-label">Активна до: <strong>${until}</strong></div>
        <div class="url-row">
          <div class="url-box">${gurl}</div>
          <button class="copy-btn" onclick="copyText('${d.gateway_url}', this)">Копировать</button>
        </div>
        <div class="code-hint">POST ${gurl}
Authorization: Bearer &lt;токен&gt;
Content-Type: application/json

{ "message": "..." }</div>`;
    } else {
      panel.innerHTML = `<div style="color:#e8463c;font-size:.85rem">${esc(d.message || 'Ошибка')}</div>`;
    }
  } catch (e) {
    panel.innerHTML = `<div style="color:#e8463c;font-size:.85rem">Ошибка сети</div>`;
  }
}

function renderAgents(subs) {
  const el = document.getElementById('pageState');

  if (!subs || !subs.length) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🤖</div>
        <h2>Агентов пока нет</h2>
        <p>Подключите первого ИИ-агента из каталога и автоматизируйте рутинные задачи уже сегодня.</p>
        <a href="/frontend/agents/agents.html" class="btn-primary">Перейти в каталог</a>
      </div>`;
    return;
  }

  const active = subs.filter(s => s.status === 'active');
  let html = `
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-val">${active.length}</div>
        <div class="stat-label">Активных агентов</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${subs.length}</div>
        <div class="stat-label">Всего подписок</div>
      </div>
    </div>`;

  subs.forEach((s, i) => {
    const isActive = s.status === 'active' && new Date(s.active_until) > new Date();
    html += `
      <div class="my-agent-card">
        <div class="card-top">
          <div class="agent-icon-lg">🤖</div>
          <div class="agent-info">
            <h3>${esc(s.agent_name || 'Агент #' + s.agent_id)}</h3>
            <div class="meta">Агент #${s.agent_id} · ${isActive ? 'до ' + fmtDate(s.active_until) : 'истекла'}</div>
            <span class="agent-status ${isActive ? 'status-active' : 'status-expired'}">
              ${isActive ? '● Активна' : '✕ Истекла'}
            </span>
          </div>
          <div class="agent-actions">
            ${isActive ? `<button id="gwbtn-${i}" class="btn-sm btn-green" onclick="toggleGateway(${i}, ${s.agent_id})">🔗 Gateway URL</button>` : ''}
            <a href="/frontend/agents/agent.html?id=${s.agent_id}" class="btn-sm btn-outline">Страница агента</a>
            ${isActive ? `<a href="/frontend/agents/agent.html?id=${s.agent_id}" class="btn-sm btn-outline" style="border-color:#ffc107;color:#856404">Продлить</a>` : `<a href="/frontend/agents/agent.html?id=${s.agent_id}" class="btn-primary" style="font-size:.83rem;padding:6px 14px">Подключить снова</a>`}
          </div>
        </div>
        ${isActive ? `<div class="gateway-panel" id="gw-${i}"></div>` : ''}
      </div>`;
  });

  html += `<div style="margin-top:20px"><a href="/frontend/agents/agents.html" class="btn-primary">+ Добавить агента</a></div>`;
  el.innerHTML = html;
}

async function init() {
  if (!token) {
    document.getElementById('pageState').innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🔐</div>
        <h2>Нужна авторизация</h2>
        <p>Войдите в аккаунт, чтобы увидеть своих агентов.</p>
        <a href="/frontend/login/" class="btn-primary">Войти</a>
      </div>`;
    return;
  }

  try {
    const r = await fetch('/api/agents/my-subscriptions', {
      headers: { Authorization: 'Bearer ' + token }
    });
    const d = await r.json();
    renderAgents(d.subscriptions || []);
  } catch (e) {
    document.getElementById('pageState').innerHTML =
      '<div style="color:#e8463c;padding:24px">Ошибка загрузки. Обновите страницу.</div>';
  }
}

init();
</script>
</body>
</html>
