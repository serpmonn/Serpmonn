    <div class="auth-box">
        <div id="statusMessage" class="message"></div>
        <form id="registerForm" class="auth-form" style="display: none;">
            <h3>@onnmail-registrering</h3>
            <input type="text" id="username" placeholder="Användarnamn" required>
            <div class="email-suffix">
                <input type="text" id="emailLocalPart" placeholder="user" required>
                <span>@onnmail.ru</span>
            </div>
            <input type="password" id="password" placeholder="Lösenord" required>
            <input type="password" id="passwordConfirm" placeholder="Upprepa lösenord" required>
            <button type="submit">Skapa konto</button>
            <p id="registerMessage" class="message"></p>
        </form>
    </div>

    <div style="height: 60px; clear: both; background: transparent;"></div>

    <div class="ad-container content-page">
        <ins
            class="mrg-tag"
            style="display:inline-block;width:auto;height:600px"
            data-ad-client="ad-1873088"
            data-ad-slot="1873088">
        </ins>
        <script>
            (MRGtag = window.MRGtag || []).push({});
        </script>
    </div>

    <script>/*GLOBAL_AD_HOOK*/(function(){
      function handleIns(ins){
        if (!ins || ins.__handled) return; ins.__handled = true;
        setTimeout(function(){
          var has = !!ins.querySelector("iframe");
          if (!has) { (window.MRGtag=window.MRGtag||[]).push({}); }
          setTimeout(function(){ if (!ins.querySelector("iframe")) { var p=ins.closest(".ad-top-banner,.ad-leaderboard,.promo-ad-inline,#mobile-anchor-ad"); if(p) p.style.display='none'; } }, 2000);
        }, 2000);
      }
      document.querySelectorAll("ins.mrg-tag").forEach(handleIns);
      var mo = new MutationObserver(function(muts){
        muts.forEach(function(m){ m.addedNodes && m.addedNodes.forEach(function(n){ if(n.querySelectorAll){ n.querySelectorAll("ins.mrg-tag").forEach(handleIns); } }); });
      });
      mo.observe(document.documentElement,{childList:true,subtree:true});
    })();</script>
