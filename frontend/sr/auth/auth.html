<body>
    <div class="container auth-container">
        <h2>Пријава на Serpmonn</h2>

        <div id="authFormsView">
            <div id="VkIdSdkOneTap" class="vk-auth-widget" aria-label="Настави са VK ID"></div>

            <button type="button" id="messengerLoginBtn" class="messenger-login-btn">
                Sign in with Serpmonn Messenger
            </button>

            <p class="auth-divider"><span>или</span></p>

            <div class="auth-tabs" role="tablist">
                <button type="button" class="auth-tab active" data-tab="login" role="tab" aria-selected="true" id="tab-login">Пријави се</button>
                <button type="button" class="auth-tab" data-tab="register" role="tab" aria-selected="false" id="tab-register">Регистрација</button>
            </div>

            <div id="panel-login" class="auth-panel active" role="tabpanel" aria-labelledby="tab-login">
                <form id="loginForm">
                    <label for="loginEmail">Имејл</label>
                    <input type="email" id="loginEmail" name="email" autocomplete="email" required>

                    <label for="loginPassword">Лозинка</label>
                    <div class="password-container">
                        <input type="password" id="loginPassword" name="password" autocomplete="current-password" required>
                        <button type="button" class="toggle-password" data-target="loginPassword" aria-label="Прикажи/сакриј лозинку">👁</button>
                    </div>

                    <button class="submit-btn" type="submit">Пријави се</button>
                </form>
                <p class="auth-forgot">
                    <a href="/frontend/sr/login/forgot/forgot.html">Заборавили сте лозинку?</a>
                </p>
            </div>

            <div id="panel-register" class="auth-panel" role="tabpanel" aria-labelledby="tab-register" hidden>
                <form id="registerForm">
                    <label for="registerEmail">Имејл</label>
                    <input type="email" id="registerEmail" name="email" autocomplete="email" required>

                    <label for="registerPassword">Лозинка</label>
                    <div class="password-container">
                        <input type="password" id="registerPassword" name="password" autocomplete="new-password" minlength="6" required>
                        <button type="button" class="toggle-password" data-target="registerPassword" aria-label="Прикажи/сакриј лозинку">👁</button>
                    </div>

                    <label class="policy-checkbox">
                        <input type="checkbox" id="policyCheckbox" required>
                        Слажем се са <a href="/frontend/sr/privacy-policy/privacy-policy.html" target="_blank">Политиком приватности</a>
                    </label>

                    <button class="submit-btn" type="submit">Направите налог</button>
                </form>
            </div>

            <p id="message" class="auth-message" role="status"></p>
        </div>

        <div id="registerSuccessView" class="register-success" hidden>
            <h3>Проверите пошту</h3>
            <p id="registerSuccessText"></p>
            <template id="registerSuccessTemplate">Послали смо потврдни имејл на <strong>{email}</strong>. Отворите везу у поруци да потврдите налог.</template>
            <button type="button" class="submit-btn secondary-btn" id="backToLoginBtn">Повратак на пријаву</button>
        </div>
    </div>

    <div id="messengerLoginModal" class="messenger-modal" hidden>
        <div class="messenger-modal__backdrop" data-messenger-close></div>
        <div class="messenger-modal__card" role="dialog" aria-modal="true" aria-labelledby="messengerLoginTitle">
            <h3 id="messengerLoginTitle">Sign in with Serpmonn Messenger</h3>
            <p class="messenger-modal__hint">Scan the QR code in the messenger</p>
            <canvas id="messengerQrCanvas" width="220" height="220" aria-label="QR"></canvas>
            <p class="messenger-modal__code">Code: <strong id="messengerShortCode">————</strong></p>
            <p id="messengerLoginStatus" class="messenger-modal__status">Waiting for confirmation…</p>
            <button type="button" class="submit-btn secondary-btn" data-messenger-close>Cancel</button>
        </div>
    </div>

    <script type="module" src="/frontend/auth/auth_scripts.js" defer></script>
    <script type="module" src="/frontend/scripts/menu-loader.js" defer></script>
    <script src="/frontend/scripts/mobile-enhancements.js" defer></script>
</body>
