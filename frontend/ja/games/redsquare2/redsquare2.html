<body>
    <div class="instruction-overlay" id="instructionOverlay">
        <div class="instruction-content">
            <h2 class="instruction-title">落ちる青い四角の遊び方</h2>
            <ul class="instruction-list">
                <li><strong>操作：</strong> 矢印キーまたはタッチで赤い四角を左右に移動</li>
                <li><strong>目的：</strong> 落ちるオブジェクトを避ける</li>
                <li><strong>得点：</strong> 避けるごとに 1 ポイント</li>
                <li><strong>ミス：</strong> オブジェクトに当たるとミス</li>
                <li><strong>終了：</strong> 10 回衝突でゲームオーバー</li>
                <li><strong>ランキング：</strong> ゲーム後に結果を確認</li>
                <li><strong>一時停止：</strong> 一時停止ボタンで止める</li>
            </ul>
            <button class="instruction-button" id="understandBtn">了解、始めよう！</button>
        </div>
    </div>

    <div id="score">スコア：0</div>
    <div id="missed">ミス：0</div>
    <div class="button-container">
        <button id="leaderboardBtn">ランキング</button>
        <button id="pauseBtn">一時停止</button>
        <button id="restartBtn">やり直し</button>
    </div>
    <form id="nicknameForm">
        <input type="text" id="nickname" placeholder="名前を入力" required>
        <button type="submit">ゲーム開始</button>
    </form>
    <canvas id="gameCanvas"></canvas>
