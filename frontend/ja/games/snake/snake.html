
<!DOCTYPE html>
<html lang="ja" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Language" content="ja">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>スネーク — Serpmonn</title>
  <meta name="description" content="クラシックなスネークゲーム：リンゴをたくさん集め、衝突を避けましょう。">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://serpmonn.ru/frontend/ja/games/snake/snake.html">
  <meta property="og:title" content="スネーク — Serpmonn">
  <meta property="og:description" content="クラシックなスネークをオンラインで：ヘビを操作し、餌を集めて記録を更新。">
  <meta property="og:image" content="https://serpmonn.ru/frontend/images/snake.png">

  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://serpmonn.ru/frontend/ja/games/snake/snake.html">
  <meta property="twitter:title" content="スネーク — Serpmonn">
  <meta property="twitter:description" content="オンラインスネーク：Serpmonn のアーケード名作。">
  <meta property="twitter:image" content="https://serpmonn.ru/frontend/images/snake.png">

  <link rel="canonical" href="https://serpmonn.ru/frontend/ja/games/snake/snake.html">
  <link rel="icon" href="/frontend/images/snake.png" type="image/x-icon">

  <link rel="stylesheet" href="/frontend/styles/styles.css">
  <link rel="stylesheet" href="/frontend/styles/base.css">
  <link rel="stylesheet" href="/frontend/styles/accessibility.css">
  <link rel="stylesheet" href="/frontend/styles/menu.css">
  <link rel="stylesheet" href="/frontend/games/snake/snake.css">

  <script type="module" src="/frontend/scripts/menu-loader.js" defer></script>
</head>
<body>
  <div id="menuContainer"></div>

  <script>
  (function(){
    function isMobile(){
      return /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || (window.innerWidth < 768);
    }
    function showInstructions(){
      try{
        if (localStorage.getItem('game_instructions_snake_shown') === '1') return;

        var ov = document.createElement('div');
        ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:9998;';

        var box = document.createElement('div');
        box.style.cssText = 'max-width:90vw;background:#141821;color:#fff;border:1px solid #1f2632;border-radius:12px;padding:16px;text-align:left;';

        var h = document.createElement('h3');
        h.textContent = '遊び方 — スネーク';
        h.style.margin = '0 0 8px';

        var p = document.createElement('div');
        p.style.cssText = 'font-size:14px;line-height:1.5;white-space:pre-line';
        p.textContent = isMobile() ? window.i18n.instructionsMobile : window.i18n.instructionsDesktop;

        var btn = document.createElement('button');
        btn.className = 'btn';
        btn.textContent = '了解';
        btn.style.marginTop = '10px';
        btn.onclick = function(){
          localStorage.setItem('game_instructions_snake_shown','1');
          ov.remove();
        };

        box.appendChild(h);
        box.appendChild(p);
        box.appendChild(btn);
        ov.appendChild(box);
        document.body.appendChild(ov);
      }catch(e){}
    }
    document.addEventListener('DOMContentLoaded', showInstructions);
  })();
  </script>

  <div class="page">
    <header>
      <img src="/frontend/images/snake.png" width="28" height="28" alt="ゲーム" style="border-radius:6px;">
      <h1>スネーク</h1>
    </header>

    <div class="wrap">
      <div class="panel">
        <canvas id="game" width="480" height="480" aria-label="ゲーム盤"></canvas>
        <div class="hint">操作：矢印キーまたは WASD。一時停止 — スペース。再開 — R。</div>
      </div>

      <div class="panel">
        <h2>統計</h2>

        <div class="stats">
          <div class="stat">スコア<br><b id="score">0</b></div>
          <div class="stat">最高<br><b id="best">0</b></div>
        </div>

        <div class="stats">
          <div class="stat">速度<br><b id="speed">1x</b></div>
          <div class="stat">盤面サイズ<br><b>24×24</b></div>
        </div>

        <div style="display:flex; gap:8px; justify-content:center; margin-top:8px;">
          <button class="btn primary" id="btnStart">スタート</button>
          <button class="btn" id="btnPause">一時停止</button>
          <button class="btn" id="btnReset">やり直し</button>
        </div>

        <div class="controls" aria-label="モバイル操作">
          <div></div>
          <button class="btn" data-dir="up">▲</button>
          <div></div>
          <button class="btn" data-dir="left">◀</button>
          <button class="btn" data-dir="down">▼</button>
          <button class="btn" data-dir="right">▶</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    window.i18n = {
      gameOver: "ゲームオーバー",
      pressRToRestart: "R を押してやり直し",
      instructionsDesktop: "• 矢印キーまたは WASD — 操作\n• スペース — 一時停止\n• R — やり直し",
      instructionsMobile: "• スワイプ — 操作\n• スタート/一時停止 — ボタン"
    };
  </script>
  <script src="/frontend/games/snake/snake.js?v=2" defer></script>
  <script src="/frontend/scripts/mobile-enhancements.js" defer></script>
</body>
</html>
