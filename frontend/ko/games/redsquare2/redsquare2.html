<body>
    <div class="instruction-overlay" id="instructionOverlay">
        <div class="instruction-content">
            <h2 class="instruction-title">떨어지는 파란 사각형 플레이 방법</h2>
            <ul class="instruction-list">
                <li><strong>조작:</strong> 방향키 또는 터치로 빨간 사각형을 좌우로 이동</li>
                <li><strong>목표:</strong> 떨어지는 물체 피하기</li>
                <li><strong>점수:</strong> 피할 때마다 1점</li>
                <li><strong>실수:</strong> 물체에 맞으면 실수로 카운트</li>
                <li><strong>게임 오버:</strong> 10번 충돌 시 종료</li>
                <li><strong>리더보드:</strong> 게임 후 결과 확인</li>
                <li><strong>일시정지:</strong> 일시정지 버튼으로 멈추기</li>
            </ul>
            <button class="instruction-button" id="understandBtn">알겠어요, 시작!</button>
        </div>
    </div>

    <div id="score">점수: 0</div>
    <div id="missed">실수: 0</div>
    <div class="button-container">
        <button id="leaderboardBtn">리더보드</button>
        <button id="pauseBtn">일시정지</button>
        <button id="restartBtn">다시</button>
    </div>
    <form id="nicknameForm">
        <input type="text" id="nickname" placeholder="이름 입력" required>
        <button type="submit">게임 시작</button>
    </form>
    <canvas id="gameCanvas"></canvas>
