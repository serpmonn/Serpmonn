<body>
    <div class="instruction-overlay" id="instructionOverlay">
        <div class="instruction-content">
            <h2>كيف تلعب الهروب المربع؟</h2>
            <div class="instruction-list">
                <p>1. تحكم بالمربع الأحمر بالأزرار أو الأسهم أو السحب على الجوال</p>
                <p>2. تجنب الاصطدام بالمربعات الزرقاء والعوائق الخضراء</p>
                <p>3. اجمع المكافآت الذهبية لنقاط إضافية</p>
                <p>4. كلما بقيت أطول، زادت نقاطك</p>
                <p>5. استخدم زر الإيقاف المؤقت (أو المسافة) للراحة</p>
            </div>
            <button class="instruction-button" id="understandBtn">فهمت!</button>
        </div>

        </div>

        <div class="obstacle" style="top: 20%; left: 20%;"></div>
        <div class="obstacle" style="top: 80%; left: 80%;"></div>
    </div>
    <div class="controls">
        <div class="button" id="up">↑</div>
        <div class="button" id="left">←</div>
        <div class="button" id="down">↓</div>
        <div class="button" id="right">→</div>
    </div>
    <button class="start" id="start">ابدأ اللعبة</button>
    <button class="restart" id="restart">من جديد</button>
    <button class="home" id="home">الرئيسية</button>
