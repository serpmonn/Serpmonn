<body>
    <div class="instruction-overlay" id="instructionOverlay">
        <div class="instruction-content">
            <h2 class="instruction-title">如何玩坠落的蓝色方块？</h2>
            <ul class="instruction-list">
                <li><strong>操作：</strong> 用方向键或触屏左右移动红色方块</li>
                <li><strong>目标：</strong> 躲避坠落的物体</li>
                <li><strong>得分：</strong> 每躲过一个物体得 1 分</li>
                <li><strong>失误：</strong> 物体碰到你算失误</li>
                <li><strong>结束：</strong> 碰撞 10 次后游戏结束</li>
                <li><strong>排行榜：</strong> 游戏结束后可查看排行榜</li>
                <li><strong>暂停：</strong> 使用暂停按钮临时停止</li>
            </ul>
            <button class="instruction-button" id="understandBtn">知道了，开始！</button>
        </div>
    </div>

    <div id="score">分数：0</div>
    <div id="missed">失误：0</div>
    <div class="button-container">
        <button id="leaderboardBtn">排行榜</button>
        <button id="pauseBtn">暂停</button>
        <button id="restartBtn">重来</button>
    </div>
    <form id="nicknameForm">
        <input type="text" id="nickname" placeholder="输入你的名字" required>
        <button type="submit">开始游戏</button>
    </form>
    <canvas id="gameCanvas"></canvas>
