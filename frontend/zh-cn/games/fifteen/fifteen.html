<body>
  <div id="menuContainer"></div>

  <script>
    window.i18n = {
      continueAd: "继续",
      instructionsDesktop: "• 方向键或 WASD — 移动方块\n• 目标：将数字 1 到 15 按顺序排列\n• 空格应在右下角\n• 步数和时间越少越好！",
      instructionsMobile: "• 滑动 — 移动方块\n• 目标：将数字 1 到 15 按顺序排列\n• 空格应在右下角"
    };
  </script>
  <script src="/frontend/games/fifteen/fifteen-ads.js?v=2" defer></script>

  <script>
  (function(){
    function isMobile(){
      return /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || (window.innerWidth < 768);
    }
    function showInstructions(){
      try{
        if (localStorage.getItem('game_instructions_fifteen_shown') === '1') return;

        var ov = document.createElement('div');
        ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:9998;';

        var box = document.createElement('div');
        box.style.cssText = 'max-width:90vw;background:#141821;color:#fff;border:1px solid #1f2632;border-radius:12px;padding:16px;text-align:left;';

        var h = document.createElement('h3');
        h.textContent = '如何游玩 — 十五谜';
        h.style.margin = '0 0 8px';

        var p = document.createElement('div');
        p.style.cssText = 'font-size:14px;line-height:1.5;white-space:pre-line';
        p.textContent = isMobile() ? window.i18n.instructionsMobile : window.i18n.instructionsDesktop;

        var btn = document.createElement('button');
        btn.className = 'btn';
        btn.textContent = '知道了';
        btn.style.marginTop = '10px';
        btn.onclick = function(){
          localStorage.setItem('game_instructions_fifteen_shown','1');
          ov.remove();
        };

        box.appendChild(h);
        box.appendChild(p);
        box.appendChild(btn);
        ov.appendChild(box);
        document.body.appendChild(ov);
      }catch(e){}
    }
    document.addEventListener('DOMContentLoaded', showInstructions);
  })();
  </script>

  <div class="page">
    <header>
      <img src="/frontend/images/fifteen.png" width="28" height="28" alt="游戏" style="border-radius:6px;">
      <h1>十五谜</h1>
    </header>

    <div class="ad-top-banner" style="text-align:center;margin:16px 0;">
      <ins class="mrg-tag" style="display:inline-block;" data-ad-client="ad-1897960" data-ad-slot="1897960"></ins>
    </div>
    <script>(window.MRGtag = window.MRGtag || []).push({});</script>

    <div class="wrap">
      <div class="panel">
        <div id="game" class="game-board" aria-label="十五谜游戏区域"></div>
        <div class="hint" style="display:none;">移动方块，将数字 1 到 15 按顺序排列。使用方向键或 WASD。</div>
      </div>

      <div class="panel">
        <div class="stats">
          <div class="stat">步数<br><b id="moves">0</b></div>
          <div class="stat">时间<br><b id="time">0</b>秒</div>
          <div class="stat">最佳<br><b id="best">0</b></div>
        </div>

        <div class="controls">
          <button class="btn primary" id="btnNewGame">新游戏</button>
          <button class="btn" id="btnReset">重置</button>
        </div>

        <div class="solved-message" id="solvedMessage" style="display:none;">
          <h3>恭喜！</h3>
          <p>你完成了拼图！</p>
        </div>
      </div>
    </div>
  </div>

  <script src="/frontend/games/fifteen/fifteen.js?v=2" defer></script>
