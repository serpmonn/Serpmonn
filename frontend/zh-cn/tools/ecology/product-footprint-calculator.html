    <!-- Скрипты для рекламы -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Инициализация рекламы
            const adTags = document.querySelectorAll('.mrg-tag');
            
            if (adTags.length > 0) {
                // Проверка загрузки рекламы
                function checkAdVisibility(adTag) {
                    const adContainer = adTag.closest('.ad-container');
                    if (!adContainer) return;
                    
                    // Проверяем различные условия невидимости рекламы
                    const isAdVisible = adTag && 
                                       adTag.offsetHeight > 0 && 
                                       adTag.innerHTML.trim() !== '' &&
                                       window.getComputedStyle(adTag).display !== 'none' &&
                                       window.getComputedStyle(adTag).visibility !== 'hidden' &&
                                       adTag.getBoundingClientRect().height > 0;
                    
                    if (!isAdVisible) {
                        adContainer.classList.add('hidden');
                    } else {
                        adContainer.classList.remove('hidden');
                    }
                }

                // Проверяем рекламу несколько раз с интервалами
                adTags.forEach(tag => {
                    setTimeout(() => checkAdVisibility(tag), 2000);
                    setTimeout(() => checkAdVisibility(tag), 5000);
                    setTimeout(() => checkAdVisibility(tag), 10000);
                });

                // Также проверяем при изменении размера окна
                window.addEventListener('resize', function() {
                    setTimeout(() => {
                        adTags.forEach(tag => checkAdVisibility(tag));
                    }, 500);
                });

                // Наблюдатель за изменениями в DOM для рекламы
                const mutationObserver = new MutationObserver(function(mutations) {
                    mutations.forEach(function(mutation) {
                        if (mutation.type === 'childList' || mutation.type === 'attributes') {
                            setTimeout(() => {
                                adTags.forEach(tag => checkAdVisibility(tag));
                            }, 1000);
                        }
                    });
                });

                adTags.forEach(tag => {
                    mutationObserver.observe(tag, {
                        childList: true,
                        attributes: true,
                        subtree: true
                    });
                });
            }

            /*GLOBAL_AD_HOOK*/
            (function(){
                function handleIns(ins){
                    if (!ins || ins.__handled) return; 
                    ins.__handled = true;
                    setTimeout(function(){
                        var has = !!ins.querySelector("iframe");
                        if (!has) { (window.MRGtag=window.MRGtag||[]).push({}); }
                        setTimeout(function(){ 
                            if (!ins.querySelector("iframe")) { 
                                var p=ins.closest(".ad-container,.mobile-anchor-ad"); 
                                if(p) p.style.display='none'; 
                            } 
                        }, 2000);
                    });
                }
                document.querySelectorAll("ins.mrg-tag").forEach(handleIns);
                var mo = new MutationObserver(function(muts){
                    muts.forEach(function(m){ 
                        m.addedNodes && m.addedNodes.forEach(function(n){ 
                            if(n.querySelectorAll){ 
                                n.querySelectorAll("ins.mrg-tag").forEach(handleIns); 
                            } 
                        }); 
                    });
                });
                mo.observe(document.documentElement,{childList:true,subtree:true});
            })();
        });
    </script>
