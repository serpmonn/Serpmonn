
<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting…</title>
    <link rel="canonical" href="/frontend/hu/auth/auth.html?tab=register">
    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            params.set('tab', 'register');
            var target = '/frontend/hu/auth/auth.html?' + params.toString();
            window.location.replace(target);
        })();
    </script>
    <noscript>
        <meta http-equiv="refresh" content="0;url=/frontend/hu/auth/auth.html?tab=register">
    </noscript>
</head>
<body>
    <p><a href="/frontend/hu/auth/auth.html?tab=register">Continue to registration</a></p>
</body>
</html>
