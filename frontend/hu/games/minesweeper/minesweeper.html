<body>
  <div id="menuContainer"></div>

  <script>
    window.i18n = {
      timeSuffix: "s",
      noRecord: "—",
      winMessage: "Wygrana!",
      loseMessage: "Bum!",
      continueAd: "Kontynuuj",
      instructionsDesktop: "• LPM — odkryj\n• PPM lub Shift — flaga\n• Pierwsze kliknięcie bezpieczne",
      instructionsMobile: "• Krótkie dotknięcie — odkryj\n• Długie dotknięcie (≥0,4s) — flaga"
    };
  </script>
  <script type="module" src="/frontend/games/minesweeper/minesweeper-ads.js?v=3" defer></script>

  <script>
  (function(){
    function isMobile(){
      return /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || (window.innerWidth < 768);
    }
    function showInstructions(){
      try{
        if (localStorage.getItem('game_instructions_mines_shown') === '1') return;

        var ov = document.createElement('div');
        ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:9998;';

        var box = document.createElement('div');
        box.style.cssText = 'max-width:90vw;background:#141821;color:#fff;border:1px solid #1f2632;border-radius:12px;padding:16px;text-align:left;';

        var h = document.createElement('h3');
        h.textContent = 'Jak grać — Saper';
        h.style.margin = '0 0 8px';

        var p = document.createElement('div');
        p.style.cssText = 'font-size:14px;line-height:1.5;white-space:pre-line';
        p.textContent = isMobile() ? window.i18n.instructionsMobile : window.i18n.instructionsDesktop;

        var btn = document.createElement('button');
        btn.className = 'btn';
        btn.textContent = 'Rozumiem';
        btn.style.marginTop = '10px';
        btn.onclick = function(){
          localStorage.setItem('game_instructions_mines_shown','1');
          ov.remove();
        };

        box.appendChild(h);
        box.appendChild(p);
        box.appendChild(btn);
        ov.appendChild(box);
        document.body.appendChild(ov);
      }catch(e){}
    }
    document.addEventListener('DOMContentLoaded', showInstructions);
  })();
  </script>

  <div class="page">
    <header>
      <img src="/frontend/images/minesweeper.png" width="28" height="28" alt="Gry" style="border-radius:6px;">
      <h1>Saper</h1>
    </header>

    <div class="ad-top-banner" style="text-align:center;margin:16px 0;">
      <ins class="mrg-tag" style="display:inline-block;" data-ad-client="ad-1897960" data-ad-slot="1897960"></ins>
    </div>
    <script>(window.MRGtag = window.MRGtag || []).push({});</script>

    <div class="wrap">
      <div class="panel">
        <div id="board" class="board" aria-label="Plansza"></div>
        <div class="hint" style="display:none;">LPM — odkryj, PPM/Shift — flaga. Pierwsze kliknięcie zawsze bezpieczne. Od nowa — R.</div>
      </div>

      <div class="panel">
        <div class="stats">
          <div class="stat">Miny<br><b id="minesLeft">15</b></div>
          <div class="stat">Czas<br><b id="time">0</b>s</div>
          <div class="stat">Rekord<br><b id="best">—</b></div>
        </div>

        <div class="controls">
          <button class="btn primary" id="btnStart">Start</button>
          <button class="btn" id="btnReset">Od nowa</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/frontend/games/minesweeper/minesweeper.js?v=3" defer></script>
  <script src="/frontend/scripts/mobile-enhancements.js" defer></script>
</body>
