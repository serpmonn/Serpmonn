    <h1>🔗 Генератор UTM‑меток</h1>
    
    <p class="tool-lead">Соберите UTM-ссылку для кампании за несколько секунд.</p>
    

    <div class="calculator-container">
      <h2>Параметры UTM</h2>
      <div id="error-message" class="error-message hidden" role="alert"></div>

      <div class="input-section">
        <div class="input-group">
          <label for="base">Базовый URL</label>
          <input id="base" placeholder="https://example.com/landing" />
        </div>
        <div class="input-group">
          <label for="source">utm_source</label>
          <input id="source" placeholder="telegram" />
        </div>
        <div class="input-group">
          <label for="medium">utm_medium</label>
          <input id="medium" placeholder="bot" />
        </div>
        <div class="input-group">
          <label for="campaign">utm_campaign</label>
          <input id="campaign" placeholder="spring_sale" />
        </div>
      </div>

      <div class="action-bar">
        <button type="button" class="calculate-btn" id="btn-build">Сгенерировать</button>
        <details class="more-actions">
          <summary>Ещё</summary>
          <div class="more-actions__list">
            <button type="button" id="btn-copy">Копировать</button>
            <button type="button" id="btn-reset">Сбросить</button>
            <button type="button" id="btn-share">Поделиться</button>
          </div>
        </details>
      </div>

      <details class="optional-fields">
        <summary>Дополнительно</summary>
        <div class="input-section">
          <div class="input-group">
            <label for="content">utm_content</label>
            <input id="content" placeholder="banner_a" />
          </div>
          <div class="input-group">
            <label for="term">utm_term</label>
            <input id="term" placeholder="keyword" />
          </div>
        </div>
      </details>

      <div class="results">
        <h3>Сгенерированная ссылка:</h3>
        <div class="result-hero">
          <div class="output" id="result">—</div>
        </div>
        <p class="result-disclaimer">Ссылка собирается локально в браузере.</p>
      </div>
    </div>
