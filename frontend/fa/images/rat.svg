  <circle cx="62" cy="97" r="6" fill="#1a1a2e"/>
  <circle cx="62" cy="97" r="4" fill="#e8b4b8"/>
  <circle cx="63" cy="96" r="1.5" fill="white"/>
  <!-- Nose -->
  <ellipse cx="48" cy="104" rx="5" ry="4" fill="#c9a87c"/>
  <circle cx="48" cy="103" r="2.5" fill="#e8b4b8"/>
