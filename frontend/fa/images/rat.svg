  <circle cx="55" cy="75" r="14" fill="#c9a87c"/>
  <circle cx="55" cy="75" r="9" fill="#e8b4b8"/>
  <circle cx="80" cy="70" r="12" fill="#c9a87c"/>
  <circle cx="80" cy="70" r="7" fill="#e8b4b8"/>
