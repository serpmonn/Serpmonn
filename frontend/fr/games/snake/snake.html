<body>
  <div id="menuContainer"></div>

  <script>
  (function(){
    function isMobile(){
      return /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || (window.innerWidth < 768);
    }
    function showInstructions(){
      try{
        if (localStorage.getItem('game_instructions_snake_shown') === '1') return;

        var ov = document.createElement('div');
        ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:9998;';

        var box = document.createElement('div');
        box.style.cssText = 'max-width:90vw;background:#141821;color:#fff;border:1px solid #1f2632;border-radius:12px;padding:16px;text-align:left;';

        var h = document.createElement('h3');
        h.textContent = 'Comment jouer — Serpent';
        h.style.margin = '0 0 8px';

        var p = document.createElement('div');
        p.style.cssText = 'font-size:14px;line-height:1.5;white-space:pre-line';
        p.textContent = isMobile() ? window.i18n.instructionsMobile : window.i18n.instructionsDesktop;

        var btn = document.createElement('button');
        btn.className = 'btn';
        btn.textContent = 'Compris';
        btn.style.marginTop = '10px';
        btn.onclick = function(){
          localStorage.setItem('game_instructions_snake_shown','1');
          ov.remove();
        };

        box.appendChild(h);
        box.appendChild(p);
        box.appendChild(btn);
        ov.appendChild(box);
        document.body.appendChild(ov);
      }catch(e){}
    }
    document.addEventListener('DOMContentLoaded', showInstructions);
  })();
  </script>

  <div class="page">
    <div class="ad-top-banner" style="text-align:center;margin:16px 0;">
      <ins class="mrg-tag" style="display:inline-block;" data-ad-client="ad-1897960" data-ad-slot="1897960"></ins>
    </div>
    <header>
      <img src="/frontend/images/snake.png" width="28" height="28" alt="Jeux" style="border-radius:6px;">
      <h1>Serpent</h1>
    </header>

    <div class="wrap">
      <div class="panel">
        <canvas id="game" width="480" height="480" aria-label="Plateau de jeu"></canvas>
        <div class="hint">Contrôles : flèches ou WASD. Pause — Espace. Recommencer — R.</div>
      </div>

      <div class="panel">
        <h2>Statistiques</h2>

        <div class="stats">
          <div class="stat">Score<br><b id="score">0</b></div>
          <div class="stat">Record<br><b id="best">0</b></div>
        </div>

        <div class="stats">
          <div class="stat">Vitesse<br><b id="speed">1x</b></div>
          <div class="stat">Taille du plateau<br><b>24×24</b></div>
        </div>

        <div style="display:flex; gap:8px; justify-content:center; margin-top:8px;">
          <button class="btn primary" id="btnStart">Démarrer</button>
          <button class="btn" id="btnPause">Pause</button>
          <button class="btn" id="btnReset">Rejouer</button>
        </div>

        <div class="controls" aria-label="Contrôles mobiles">
          <div></div>
          <button class="btn" data-dir="up">▲</button>
          <div></div>
          <button class="btn" data-dir="left">◀</button>
          <button class="btn" data-dir="down">▼</button>
          <button class="btn" data-dir="right">▶</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    window.i18n = {
      gameOver: "Partie terminée",
      pressRToRestart: "Appuyez sur R — rejouer",
      instructionsDesktop: "• Flèches ou WASD — contrôle\n• Espace — pause\n• R — recommencer",
      instructionsMobile: "• Glissements — contrôle\n• Démarrer/Pause — boutons"
    };
  </script>

</body>
</html>
