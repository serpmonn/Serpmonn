<!doctype html>
<html lang="ru" dir="ltr" class="i18n-pending">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=3, user-scalable=yes"
    />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#f7f5f1" />
    <title>404 — Serpmonn</title>
    <link rel="icon" href="/frontend/images/serpmonn.ico" type="image/x-icon" />
    <script>
      // Sync lang before paint — меньше шансов мелькнуть «чужим» языком в title/dir
      (function () {
        try {
          var lang = localStorage.getItem("spn_lang");
          if (!lang) return;
          lang = String(lang).trim().toLowerCase().replace(/[^a-z0-9-]/g, "");
          if (lang) document.documentElement.lang = lang;
        } catch (_) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Unbounded:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f7f5f1;
        --fg: #141414;
        --muted: #5f5a55;
        --accent: #e23d2f;
        --line: rgba(20, 20, 20, 0.1);
        --soft: rgba(20, 20, 20, 0.045);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        font-family: "Manrope", sans-serif;
        color: var(--fg);
        background: var(--bg);
        overflow-x: hidden;
      }

      .scene {
        position: relative;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: clamp(24px, 5vw, 56px);
        isolation: isolate;
      }

      .scene::before {
        content: "";
        position: absolute;
        inset: -15%;
        background:
          radial-gradient(circle at 20% 18%, rgba(226, 61, 47, 0.1), transparent 40%),
          radial-gradient(circle at 80% 12%, rgba(20, 20, 20, 0.05), transparent 34%),
          radial-gradient(circle at 55% 90%, rgba(226, 61, 47, 0.06), transparent 42%),
          linear-gradient(165deg, #faf8f5 0%, #f3f0ea 50%, #f7f5f1 100%);
        z-index: -2;
        animation: drift 18s ease-in-out infinite alternate;
      }

      .ghost {
        position: absolute;
        left: 50%;
        top: 45%;
        transform: translate(-50%, -54%);
        font-family: "Unbounded", sans-serif;
        font-weight: 700;
        font-size: clamp(8rem, 24vw, 18rem);
        letter-spacing: -0.06em;
        line-height: 0.8;
        color: rgba(20, 20, 20, 0.035);
        user-select: none;
        pointer-events: none;
        z-index: -1;
        animation: breathe 8s ease-in-out infinite;
      }

      .content {
        width: min(680px, 100%);
        text-align: center;
        opacity: 0;
      }

      html.is-ready .content {
        opacity: 1;
        animation: rise 0.85s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 32px;
        color: var(--fg);
        text-decoration: none;
      }

      .brand-mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: #ffffff;
        border: 1px solid var(--line);
        box-shadow: 0 1px 2px rgba(20, 20, 20, 0.04);
        flex-shrink: 0;
      }

      .brand-mark img {
        width: 24px;
        height: 24px;
        display: block;
      }

      .brand-name {
        font-family: "Unbounded", sans-serif;
        font-size: 0.95rem;
        font-weight: 500;
        letter-spacing: 0.02em;
      }

      .kicker {
        display: inline-block;
        margin-bottom: 16px;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        font-family: "Unbounded", sans-serif;
        font-weight: 500;
        font-size: clamp(1.65rem, 4.2vw, 2.55rem);
        line-height: 1.18;
        letter-spacing: -0.03em;
        margin-bottom: 16px;
        text-wrap: balance;
      }

      .lead {
        max-width: 32em;
        margin: 0 auto 28px;
        font-size: clamp(1rem, 2.1vw, 1.12rem);
        line-height: 1.65;
        color: var(--muted);
        text-wrap: pretty;
      }

      .lead strong {
        color: var(--fg);
        font-weight: 600;
      }

      .actions {
        display: flex;
        justify-content: center;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 50px;
        padding: 0 24px;
        border-radius: 12px;
        font-family: inherit;
        font-size: 0.96rem;
        font-weight: 650;
        text-decoration: none;
        background: linear-gradient(145deg, #141414, #1c1c1c);
        color: #ffffff;
        border: 1px solid rgba(20, 20, 20, 0.2);
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease,
          background 0.18s ease;
      }

      .btn:hover {
        transform: translateY(-1px);
        background: linear-gradient(145deg, #1a1a1a, #242424);
        box-shadow: 0 10px 24px rgba(20, 20, 20, 0.12);
      }

      .about {
        display: inline-block;
        margin-top: 22px;
        color: #8a837c;
        font-size: 0.9rem;
        text-decoration: underline;
        text-underline-offset: 0.18em;
      }

      .about:hover {
        color: var(--fg);
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes breathe {
        0%,
        100% {
          opacity: 0.7;
          transform: translate(-50%, -54%) scale(1);
        }
        50% {
          opacity: 1;
          transform: translate(-50%, -55.5%) scale(1.012);
        }
      }

      @keyframes drift {
        from {
          transform: translate3d(-1%, -0.8%, 0) scale(1.01);
        }
        to {
          transform: translate3d(1.2%, 1.2%, 0) scale(1.04);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .scene::before,
        .ghost {
          animation: none;
        }

        html.is-ready .content {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="scene">
      <div class="ghost" aria-hidden="true">404</div>

      <div class="content">
        <a class="brand" id="link-brand" href="/">
          <span class="brand-mark">
            <img
              src="/frontend/images/serpmonn96x96transparent.png"
              alt=""
              width="24"
              height="24"
            />
          </span>
          <span class="brand-name">Serpmonn</span>
        </a>

        <div class="kicker" data-i18n="notFound.kicker">Страница не найдена</div>

        <h1>
          <span data-i18n="notFound.headingLine1">Этого здесь нет.</span><br />
          <span data-i18n="notFound.headingLine2"
            >Но это не значит, что этого никогда не будет.</span
          >
        </h1>

        <p class="lead" id="notfound-lead">
          Ссылка могла устареть — или ты просто заглянул в то, чего ещё нет.
          <strong>Serpmonn растёт</strong>, и то, что сейчас пусто, завтра может стать частью
          поиска.
        </p>

        <div class="actions">
          <a class="btn" id="link-home" href="/" data-i18n="notFound.home">На главную</a>
        </div>

        <a
          class="about"
          id="link-about"
          href="/frontend/about-project/about-project.html"
          data-i18n="notFound.about"
          >О проекте</a
        >
      </div>
    </main>

    <script type="module">
      import { loadMessages, getMessages, t } from "/frontend/scripts/i18n-loader.js?v=20260721-404b";
      import { getFrontendPath } from "/frontend/scripts/locale-paths.js?v=20260721-404b";

      const BRAND = "Serpmonn";

      function reveal() {
        document.documentElement.classList.add("is-ready");
        document.documentElement.classList.remove("i18n-pending");
      }

      // Не оставляем пустой экран, если i18n завис
      const revealTimer = setTimeout(reveal, 1200);

      function setText(el, value) {
        if (el) el.textContent = value;
      }

      function hasMsg(key) {
        const messages = getMessages();
        return Boolean(messages && messages[key]);
      }

      function resolveLocale() {
        let locale = (document.documentElement.lang || "ru").trim().toLowerCase();
        try {
          const stored = localStorage.getItem("spn_lang");
          if (stored) locale = stored.trim().toLowerCase();
        } catch (_) {}
        return locale.replace(/[^a-z0-9-]/g, "") || "ru";
      }

      function homePath(locale) {
        return locale === "ru" ? "/" : `/frontend/${locale}/index.html`;
      }

      function applyLinks(locale) {
        const home = homePath(locale);
        const about = getFrontendPath("about-project/about-project.html");
        const brand = document.getElementById("link-brand");
        const homeBtn = document.getElementById("link-home");
        const aboutLink = document.getElementById("link-about");
        if (brand) brand.setAttribute("href", home);
        if (homeBtn) homeBtn.setAttribute("href", home);
        if (aboutLink) aboutLink.setAttribute("href", about);
      }

      function applyLead() {
        const el = document.getElementById("notfound-lead");
        if (!el || !hasMsg("notFound.lead")) return;
        const raw = String(t("notFound.lead"));
        const parts = raw.split("{brand}");
        el.replaceChildren();
        if (parts.length === 1) {
          el.textContent = raw;
          return;
        }
        el.append(document.createTextNode(parts[0]));
        const strong = document.createElement("strong");
        strong.textContent = BRAND;
        el.append(strong);
        el.append(document.createTextNode(parts.slice(1).join(BRAND)));
      }

      async function applyDir(locale) {
        try {
          const res = await fetch("/frontend/i18n/languages.json", {
            credentials: "same-origin",
            cache: "no-cache",
          });
          if (!res.ok) return;
          const list = await res.json();
          const meta = list.find((x) => x && x.code === locale);
          document.documentElement.dir = meta && meta.rtl ? "rtl" : "ltr";
        } catch (_) {
          document.documentElement.dir = "ltr";
        }
      }

      try {
        const locale = resolveLocale();
        document.documentElement.lang = locale;

        const messages = await loadMessages();
        await applyDir(locale);
        applyLinks(locale);

        if (hasMsg("notFound.title")) document.title = t("notFound.title");
        document.querySelectorAll("[data-i18n]").forEach((node) => {
          const key = node.getAttribute("data-i18n");
          if (key && messages[key]) setText(node, t(key));
        });
        applyLead();
      } catch (_) {
        applyLinks(resolveLocale());
      } finally {
        clearTimeout(revealTimer);
        reveal();
      }
    </script>
  </body>
</html>
