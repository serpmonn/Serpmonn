<body>
  <div id="menuContainer"></div>

  <script>
    window.i18n = {
      timeSuffix: "s",
      noRecord: "—",
      winMessage: "Vittoria!",
      loseMessage: "Boom!",
      continueAd: "Continua",
      instructionsDesktop: "• Click sinistro — scopri\n• Click destro o Shift — bandiera\n• Primo clic sicuro",
      instructionsMobile: "• Tocco breve — scopri\n• Tocco lungo (≥0,4s) — bandiera"
    };
  </script>
  <script type="module" src="/frontend/games/minesweeper/minesweeper-ads.js?v=3" defer></script>

  <script>
  (function(){
    function isMobile(){
      return /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || (window.innerWidth < 768);
    }
    function showInstructions(){
      try{
        if (localStorage.getItem('game_instructions_mines_shown') === '1') return;

        var ov = document.createElement('div');
        ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:9998;';

        var box = document.createElement('div');
        box.style.cssText = 'max-width:90vw;background:#141821;color:#fff;border:1px solid #1f2632;border-radius:12px;padding:16px;text-align:left;';

        var h = document.createElement('h3');
        h.textContent = 'Come giocare — Campo minato';
        h.style.margin = '0 0 8px';

        var p = document.createElement('div');
        p.style.cssText = 'font-size:14px;line-height:1.5;white-space:pre-line';
        p.textContent = isMobile() ? window.i18n.instructionsMobile : window.i18n.instructionsDesktop;

        var btn = document.createElement('button');
        btn.className = 'btn';
        btn.textContent = 'Capito';
        btn.style.marginTop = '10px';
        btn.onclick = function(){
          localStorage.setItem('game_instructions_mines_shown','1');
          ov.remove();
        };

        box.appendChild(h);
        box.appendChild(p);
        box.appendChild(btn);
        ov.appendChild(box);
        document.body.appendChild(ov);
      }catch(e){}
    }
    document.addEventListener('DOMContentLoaded', showInstructions);
  })();
  </script>

  <div class="page">
    <header>
      <img src="/frontend/images/minesweeper.png" width="28" height="28" alt="Giochi" style="border-radius:6px;">
      <h1>Campo minato</h1>
    </header>

    <div class="ad-top-banner" style="text-align:center;margin:16px 0;">
      <ins class="mrg-tag" style="display:inline-block;" data-ad-client="ad-1897960" data-ad-slot="1897960"></ins>
    </div>
<div class="wrap">
      <div class="panel">
        <div id="board" class="board" aria-label="Campo di gioco"></div>
        <div class="hint" style="display:none;">Click sx — scopri, click dx/Shift — bandiera. Primo clic sempre sicuro. Ricomincia — R.</div>
      </div>

      <div class="panel">
        <div class="stats">
          <div class="stat">Mine<br><b id="minesLeft">15</b></div>
          <div class="stat">Tempo<br><b id="time">0</b>s</div>
          <div class="stat">Record<br><b id="best">—</b></div>
        </div>

        <div class="controls">
          <button class="btn primary" id="btnStart">Avvia</button>
          <button class="btn" id="btnReset">Ricomincia</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/frontend/games/minesweeper/minesweeper.js?v=3" defer></script>
  <script src="/frontend/scripts/mobile-enhancements.js" defer></script>

<script type="module" src="/frontend/scripts/ad-slot-init.js"></script>

</body>
</html>
