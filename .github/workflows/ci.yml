name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lint-test-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Validate i18n locales
        run: npm run validate:i18n

      - name: Run tests
        run: npm run test

      - name: Run security audit
        # Только prod-зависимости: critical/high в vitest/vite — это dev tooling, не прод
        run: npm audit --omit=dev --audit-level=high
