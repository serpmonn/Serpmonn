name: "Serpmonn CodeQL"

# frontend/** — артефакты сборки; сканируем только источники.
paths:
  - backend
  - assembly
  - scripts
  - relay

paths-ignore:
  - "**/node_modules/**"
  - assembly/node_modules
  - "**/.venv/**"
  - "**/venv/**"
  - relay/vendor

# Принятый риск / ложные срабатывания:
# - CDN Prism/FA в educational guides (https; контент статичный)
# - CORS * только на /gateway (Bearer, без cookie-сессии)
# - CSRF microservices / clear-text logging CI
query-filters:
  - exclude:
      id: js/functionality-from-untrusted-source
  - exclude:
      id: js/cors-misconfiguration
  - exclude:
      id: js/cors-permissive-configuration
  - exclude:
      id: js/clear-text-logging-sensitive-data
  - exclude:
      id: js/missing-token-validation
