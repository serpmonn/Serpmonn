# Legacy URL redirects — include inside server { } for serpmonn.ru
# news → knowledge-base, ku-Arab → ku-arab

# Russian (no locale prefix)
rewrite ^/frontend/news/news\.html$ /frontend/knowledge-base/knowledge-base.html permanent;
rewrite ^/frontend/news/rss\.xml$ /frontend/knowledge-base/rss.xml permanent;
rewrite ^/frontend/news/articles/(.+)$ /frontend/knowledge-base/articles/$1 permanent;

# Localized frontend paths
rewrite ^/frontend/([^/]+)/news/news\.html$ /frontend/$1/knowledge-base/knowledge-base.html permanent;
rewrite ^/frontend/([^/]+)/news/rss\.xml$ /frontend/$1/knowledge-base/rss.xml permanent;
rewrite ^/frontend/([^/]+)/news/articles/(.+)$ /frontend/$1/knowledge-base/articles/$2 permanent;

# Legacy ku-Arab locale folder (case-sensitive)
rewrite ^/frontend/ku-Arab/(.*)$ /frontend/ku-arab/$1 permanent;
rewrite ^/ku-Arab/(.*)$ /ku-arab/$1 permanent;

# Removed X-Car partner landing
rewrite ^/frontend/Partners/X-Car\.html$ /frontend/ad-info/ad-info.html permanent;
